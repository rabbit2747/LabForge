networks:
  - name: public_net
  - name: dmz_net
    internal: true
  - name: corp_net
    internal: true
  - name: drop_net
    internal: true

security_controls:
  recommended:
    - Firewall / Segmentation
    - WAF on HR Portal
    - IDS East-West Sensor
    - Central Log Collection
    - Windows Event Forwarding
    - EDR Lite Process Monitor

deployment:
  recommended_model: hybrid
  docker_only_supported: false
  docker_only_notes: >
    The MVP scaffold can model this scenario with LDAP-like services, but a
    realistic Active Directory lab requires Windows Server domain services.
  minimum_environment:
    description: Single training PC for Docker-only prototype mode.
    hosts:
      - role: training-host
        count: 1
        os: Windows 11 or Linux
        cpu: 8 cores recommended
        memory: 16 GB minimum, 32 GB recommended
        storage: 80 GB free
        software:
          - Docker Desktop or Docker Engine
          - Python 3.11+
          - Git
  realistic_environment:
    description: Proxmox or equivalent hypervisor host for Windows AD realism.
    hosts:
      - role: hypervisor-host
        count: 1
        os: Proxmox VE or VMware/Hyper-V equivalent
        cpu: 12 cores recommended
        memory: 64 GB recommended
        storage: 300 GB SSD free
        software:
          - Proxmox VE
          - Windows Server ISO
          - Windows client ISO
          - Linux attacker image
      - role: learner-pc
        count: 1
        os: Windows 10/11, macOS, or Linux
        cpu: 4 cores recommended
        memory: 8 GB minimum
        storage: 20 GB free
        software:
          - SSH client
          - Web browser
          - Optional Burp Suite Community
  required_platforms:
    - Docker Compose for prototype services
    - Windows Server for real Domain Controller
    - Ansible for repeatable Windows/Linux configuration
    - Proxmox, VMware, Hyper-V, or equivalent hypervisor for realistic mode

services:
  - name: edge-proxy
    role: external ingress
    exposed: true
    networks: [public_net]
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  - name: attacker-workstation
    role: learner attack workstation
    exposed: true
    networks: [public_net, dmz_net, drop_net]
    ports: ["2222:22"]
    healthcheck:
      test: ["CMD", "sh", "-lc", "test -d /home/attacker"]
      interval: 10s
      timeout: 3s
      retries: 10

  - name: hr-portal
    role: vulnerable external business app
    exposed: true
    networks: [public_net, dmz_net, corp_net]
    expose: ["5000"]
    user: "10001:10001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10

  - name: ldap-ad
    role: active-directory-like LDAP
    networks: [corp_net]
    expose: ["389"]
    healthcheck:
      test: ["CMD", "sh", "-lc", "true"]
      interval: 10s
      timeout: 3s
      retries: 10

  - name: reporting-server
    role: lateral movement target
    networks: [corp_net]
    expose: ["7001"]
    healthcheck:
      test: ["CMD", "sh", "-lc", "true"]
      interval: 10s
      timeout: 3s
      retries: 10

  - name: backup-server
    role: privilege escalation target
    networks: [corp_net]
    expose: ["7002"]
    healthcheck:
      test: ["CMD", "sh", "-lc", "true"]
      interval: 10s
      timeout: 3s
      retries: 10

  - name: fileserver
    role: final object store
    networks: [corp_net]
    expose: ["7003"]
    healthcheck:
      test: ["CMD", "sh", "-lc", "true"]
      interval: 10s
      timeout: 3s
      retries: 10

  - name: controlled-drop
    role: final submission service
    networks: [drop_net]
    expose: ["7502"]
    healthcheck:
      test: ["CMD", "sh", "-lc", "true"]
      interval: 10s
      timeout: 3s
      retries: 10
