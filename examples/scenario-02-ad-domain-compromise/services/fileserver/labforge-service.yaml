service: fileserver
runtime: Internal file or object service
purpose: Stores the final controlled collection object.
attack_surface:
- Internal file listing or object retrieval workflow
- Access proof validation
seed_inputs:
- board-strategy-archive
noise_inputs: []
healthcheck: Object listing or file existence check for seeded non-secret object must
  pass.
reset: Restore final object and remove temporary learner downloads or proofs.
evidence_logs:
- object-access.log
safety_boundaries:
- Final data must be synthetic and training-only.
- Object retrieval must require the intended lab proof or access condition.
