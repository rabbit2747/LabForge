name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate LabForge
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install LabForge
        run: python -m pip install -e .

      - name: Compile Python modules
        run: python -m compileall -q labforge

      - name: Guard against scenario-specific framework hooks
        run: python -m labforge guard framework-hooks .

      - name: Run framework unit tests
        run: python -m unittest discover -s tests

      - name: Validate example scenario
        run: |
          python -m labforge validate examples/scenario-02-ad-domain-compromise
          python -m labforge lint examples/scenario-02-ad-domain-compromise
          python -m labforge realism profiles
          python -m labforge realism check examples/scenario-02-ad-domain-compromise --industry enterprise --out output/scenario-02-realism.md

      - name: Validate starter template
        run: |
          python -m labforge intake template --out output/starter-intake --lab-id starter-lab --title "Starter Lab"
          python -m labforge intake scaffold --from output/starter-intake/scenario-intake.yaml --out output/intake-scaffolded-lab --force
          python -m labforge validate output/intake-scaffolded-lab
          python -m labforge init --out output/starter-lab --lab-id starter-lab --title "Starter Lab"
          python -m labforge validate output/starter-lab
          python -m labforge lint output/starter-lab
          python -m labforge controls list output/starter-lab
          python -m labforge controls apply output/starter-lab --clear --select firewall=fw-basic-segmentation --select ids=ids-east-west --profile protected
          python -m labforge services scaffold output/starter-lab
          python -m labforge services materialize output/starter-lab --force
          python -m labforge services check output/starter-lab
          python -m labforge workflow status output/starter-lab --provider docker-compose --profile protected --out output/starter-workflow-status.md || true
          python -m labforge workflow plan output/starter-lab --provider docker-compose --profile protected --format json --out output/starter-workflow-plan.json || true
          cat > output/starter-entry-service.result.yaml <<'YAML'
          task_id: service-build-entry-service
          status: complete
          service: entry-service
          summary: Replace placeholder runtime with a tiny deterministic service file.
          service_changes:
            - target_path: app.py
              content: |
                print("implemented service")
            - target_path: healthcheck.sh
              executable: true
              content: |
                #!/usr/bin/env sh
                set -eu
                echo ok
          findings: []
          open_questions: []
          YAML
          python -m labforge services review-result output/starter-lab --result output/starter-entry-service.result.yaml --force --out output/starter-review-result.md
          python -m labforge services apply-result output/starter-lab --result output/starter-entry-service.result.yaml --force --out output/starter-apply-result.md
          python -m labforge services apply-result output/starter-lab --result output/starter-entry-service.result.yaml --dry-run --force --format json > output/starter-apply-result.json
          mkdir -p output/starter-complete-results
          cp output/starter-entry-service.result.yaml output/starter-complete-results/service-build-entry-service.result.yaml
          python -m labforge services apply-results output/starter-lab --results output/starter-complete-results --force --out output/starter-batch-apply-dry-run.md
          python -m labforge services apply-results output/starter-lab --results output/starter-complete-results --execute --force --format json > output/starter-batch-apply.json
          python -m labforge services verify output/starter-lab
          python -m labforge services plan output/starter-lab --out output/starter-service-plan
          python -m labforge services agent-packages output/starter-lab --out output/starter-service-agents --adapter manual
          python -m labforge services run-agents output/starter-service-agents --adapter codex --dry-run --service entry-service
          test -f output/starter-service-agents/.ai/service-build/service-build-entry-service.package.codex.command.ps1
          python -m labforge services run-agents output/starter-service-agents --adapter claude-code --dry-run --service entry-service
          test -f output/starter-service-agents/.ai/service-build/service-build-entry-service.package.claude-code.command.ps1
          if python -m labforge services run-agents output/starter-service-agents --adapter manual --execute --service entry-service; then
            echo "manual service-builder adapter unexpectedly allowed live execution"
            exit 1
          fi
          python -m labforge workflow status output/starter-lab --results output/starter-service-agents/.ai/outputs --provider docker-compose --profile protected --out output/starter-workflow-with-results.md || true
          grep -q "service_changes:" output/starter-service-agents/.ai/outputs/service-build-entry-service.result.yaml
          if python -m labforge services review-results output/starter-lab --results output/starter-service-agents/.ai/outputs --force --out output/starter-service-batch-review.md; then
            echo "batch review unexpectedly ready for empty service-builder stubs"
            exit 1
          fi
          grep -q "Needs review" output/starter-service-batch-review.md
          if python -m labforge services apply-results output/starter-lab --results output/starter-service-agents/.ai/outputs --force --out output/starter-service-batch-apply.md; then
            echo "batch apply unexpectedly passed for empty service-builder stubs"
            exit 1
          fi
          grep -q "skipped" output/starter-service-batch-apply.md

      - name: Validate service infrastructure templates
        run: |
          python -m labforge init --out output/template-lab --lab-id template-lab --title "Template Lab" --force
          python -m labforge services templates
          python -m labforge services vulnerability-plugins
          python - <<'PY'
          from pathlib import Path
          path = Path("output/template-lab/artifacts.yaml")
          text = path.read_text(encoding="utf-8")
          text = text.replace("runtime: Linux learner workstation", "runtime: Linux learner workstation\n  template:\n    id: attacker-workstation-ssh")
          text = text.replace("runtime: Replace with service runtime", "runtime: Python web application\n  template:\n    id: python-flask-web")
          text = text.replace("purpose: First learner-facing service.", "vulnerability_plugins:\n  - id: ssti-preview\n    workflow: document preview\n    template_engine: jinja2\n    execution_boundary: lab container only\n  purpose: First learner-facing service.")
          text += """
          - service: controlled-drop
            source_path: services/controlled-drop
            runtime: Controlled drop service
            template:
              id: controlled-drop
            purpose: Lab-scoped final submission receiver.
            attack_surface: []
            seed_inputs: []
            noise_inputs: []
            healthcheck: GET /healthz must return 200.
            reset: Clear submitted training objects.
            evidence_logs:
              - submissions.log
            safety_boundaries:
              - Accept only synthetic lab submissions.
          """
          path.write_text(text, encoding="utf-8")
          topology = Path("output/template-lab/topology.yaml")
          topology.write_text(topology.read_text(encoding="utf-8") + """
          - name: controlled-drop
            role: final submission service
            exposed: false
            networks:
              - corp_net
            expose:
              - "8080"
            healthcheck:
              test: ["CMD", "sh", "-lc", "true"]
              interval: 10s
              timeout: 3s
              retries: 10
          """, encoding="utf-8")
          PY
          python -m labforge validate output/template-lab
          python -m labforge services scaffold output/template-lab --force
          python -m labforge services materialize output/template-lab --force
          test -f output/template-lab/services/entry-service/Dockerfile
          test -f output/template-lab/services/entry-service/plugins/ssti-preview.contract.yaml
          test -f output/template-lab/services/attacker-workstation/Dockerfile
          test -f output/template-lab/services/controlled-drop/Dockerfile
          python -m labforge services verify output/template-lab

      - name: Export schemas
        run: python -m labforge schema export --out output/schemas

      - name: Validate agent scaffold
        run: |
          python -m labforge agents scaffold examples/scenario-02-ad-domain-compromise --out output/scenario-02-agents
          python -m labforge agents validate output/scenario-02-agents
          python -m labforge agents adapters
          python -m labforge agents smoke-adapters examples/scenario-02-ad-domain-compromise --out output/scenario-02-adapter-smoke --force --report output/scenario-02-adapter-smoke.md
          python -m labforge agents plan-run output/scenario-02-agents --context-root examples/scenario-02-ad-domain-compromise --format json > output/agent-run-plan.json
          python -m labforge agents run output/scenario-02-agents --dry-run --adapter manual --context-root examples/scenario-02-ad-domain-compromise --agent mitre-mapper
          python -m labforge agents run output/scenario-02-agents --dry-run --adapter openai --context-root examples/scenario-02-ad-domain-compromise --agent scenario-designer
          test -f output/scenario-02-agents/.ai/run/01-scenario-designer.package.openai.json
          python -m labforge agents run output/scenario-02-agents --dry-run --adapter codex --context-root examples/scenario-02-ad-domain-compromise --agent scenario-designer
          test -f output/scenario-02-agents/.ai/run/01-scenario-designer.package.codex.command.ps1
          python -m labforge agents run output/scenario-02-agents --dry-run --adapter claude-code --context-root examples/scenario-02-ad-domain-compromise --agent scenario-designer
          test -f output/scenario-02-agents/.ai/run/01-scenario-designer.package.claude-code.command.ps1
          python -m labforge agents run output/scenario-02-agents --dry-run --adapter manual --context-root examples/scenario-02-ad-domain-compromise --agent industry-realism-reviewer
          test -f output/scenario-02-agents/.ai/run/10-industry-realism-reviewer.package.manual.md
          python -m labforge agents run output/scenario-02-agents --dry-run --adapter mcp --context-root examples/scenario-02-ad-domain-compromise --agent scenario-designer
          test -f output/scenario-02-agents/.ai/run/01-scenario-designer.package.mcp.json
          if python -m labforge agents run output/scenario-02-agents --execute --adapter manual --context-root examples/scenario-02-ad-domain-compromise --agent scenario-designer; then
            echo "manual adapter unexpectedly allowed live execution"
            exit 1
          fi
          python -m labforge agents result-stub output/scenario-02-agents --task-id 02-mitre-mapper --status needs-review --summary "Draft mapping is ready for supervisor review."
          python -m labforge agents validate output/scenario-02-agents

      - name: Run QA smoke
        run: python -m labforge qa smoke examples/scenario-02-ad-domain-compromise --out output/qa-smoke --provider docker-compose --profile protected --materialize --force

      - name: Verify release gate blocks scaffold services
        shell: bash
        run: |
          if python -m labforge qa release-gate examples/scenario-02-ad-domain-compromise --out output/release-gate --provider docker-compose --profile protected --materialize --force; then
            echo "release gate unexpectedly passed for scaffold services"
            exit 1
          fi
          test -f output/release-gate/release-gate-report.md

      - name: Build supervisor package
        run: python -m labforge package examples/scenario-02-ad-domain-compromise --out output/supervisor-package --provider docker-compose --profile protected --all-profiles --materialize --force

      - name: Validate provider lifecycle dry runs
        run: |
          python -m labforge provider deploy output/qa-smoke/provider-output --provider docker-compose
          python -m labforge provider status output/qa-smoke/provider-output --provider docker-compose
          python -m labforge provider destroy output/qa-smoke/provider-output --provider docker-compose --volumes

      - name: Build non-Docker provider scaffolds
        run: |
          python -m labforge build examples/scenario-02-ad-domain-compromise --provider ansible --profile protected --out output/provider-ansible --force
          python -m labforge build examples/scenario-02-ad-domain-compromise --provider terraform --profile protected --out output/provider-terraform --force
          python -m labforge build examples/scenario-02-ad-domain-compromise --provider ludus --profile protected --out output/provider-ludus --force
          python -m labforge build examples/scenario-02-ad-domain-compromise --provider hybrid --profile protected --out output/provider-hybrid --force
