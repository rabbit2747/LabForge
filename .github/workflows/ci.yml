name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate LabForge
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install LabForge
        run: python -m pip install -e .

      - name: Compile Python modules
        run: python -m compileall -q labforge

      - name: Validate example scenario
        run: |
          python -m labforge validate examples/scenario-02-ad-domain-compromise
          python -m labforge lint examples/scenario-02-ad-domain-compromise

      - name: Validate starter template
        run: |
          python -m labforge intake template --out output/starter-intake --lab-id starter-lab --title "Starter Lab"
          python -m labforge intake scaffold --from output/starter-intake/scenario-intake.yaml --out output/intake-scaffolded-lab --force
          python -m labforge validate output/intake-scaffolded-lab
          python -m labforge init --out output/starter-lab --lab-id starter-lab --title "Starter Lab"
          python -m labforge validate output/starter-lab
          python -m labforge lint output/starter-lab
          python -m labforge controls list output/starter-lab
          python -m labforge controls apply output/starter-lab --clear --select firewall=fw-basic-segmentation --select ids=ids-east-west --profile protected
          python -m labforge services scaffold output/starter-lab
          python -m labforge services materialize output/starter-lab --force
          python -m labforge services check output/starter-lab

      - name: Export schemas
        run: python -m labforge schema export --out output/schemas

      - name: Validate agent scaffold
        run: |
          python -m labforge agents scaffold examples/scenario-02-ad-domain-compromise --out output/scenario-02-agents
          python -m labforge agents validate output/scenario-02-agents
          python -m labforge agents plan-run output/scenario-02-agents --context-root examples/scenario-02-ad-domain-compromise --format json > output/agent-run-plan.json
          python -m labforge agents run output/scenario-02-agents --dry-run --adapter manual --context-root examples/scenario-02-ad-domain-compromise --agent mitre-mapper
          python -m labforge agents result-stub output/scenario-02-agents --task-id 02-mitre-mapper --status needs-review --summary "Draft mapping is ready for supervisor review."
          python -m labforge agents validate output/scenario-02-agents

      - name: Run QA smoke
        run: python -m labforge qa smoke examples/scenario-02-ad-domain-compromise --out output/qa-smoke --provider docker-compose --profile protected --materialize --force

      - name: Build supervisor package
        run: python -m labforge package examples/scenario-02-ad-domain-compromise --out output/supervisor-package --provider docker-compose --profile protected --materialize --force

      - name: Validate provider lifecycle dry runs
        run: |
          python -m labforge provider deploy output/qa-smoke/provider-output --provider docker-compose
          python -m labforge provider status output/qa-smoke/provider-output --provider docker-compose
          python -m labforge provider destroy output/qa-smoke/provider-output --provider docker-compose --volumes

      - name: Build non-Docker provider scaffolds
        run: |
          python -m labforge build examples/scenario-02-ad-domain-compromise --provider ansible --profile protected --out output/provider-ansible --force
          python -m labforge build examples/scenario-02-ad-domain-compromise --provider terraform --profile protected --out output/provider-terraform --force
          python -m labforge build examples/scenario-02-ad-domain-compromise --provider ludus --profile protected --out output/provider-ludus --force
          python -m labforge build examples/scenario-02-ad-domain-compromise --provider hybrid --profile protected --out output/provider-hybrid --force
